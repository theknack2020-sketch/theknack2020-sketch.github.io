<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sillora — the honest, on-device wardrobe for people who love fragrance.">
<title>Sillora</title>
<style>
  :root { --bg:#FAF6EF; --fg:#2A2119; --muted:#897B67; --accent:#AF7830; --card:#FFFFFF; --border:rgba(42,33,25,0.12); }
  @media (prefers-color-scheme: dark) { :root { --bg:#14110E; --fg:#F3E9DA; --muted:#B3A48E; --accent:#D49E4A; --card:#211C16; --border:rgba(243,233,218,0.15); } }
  * { box-sizing: border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--fg); line-height:1.6; margin:0; padding:64px 20px; -webkit-font-smoothing:antialiased; text-align:center; }
  main { max-width:560px; margin:0 auto; }
  .mark { width:96px; height:96px; border-radius:22px; margin:0 auto 20px; background:radial-gradient(120% 120% at 50% 40%, #D3A659, #A66E2E 55%, #5C380F); display:flex; align-items:center; justify-content:center; }
  .drop { width:44px; height:56px; background:linear-gradient(#FCF5E8,#EBCF9C); border-radius:50% 50% 50% 50% / 62% 62% 38% 38%; box-shadow:0 6px 16px rgba(51,31,6,0.4); }
  h1 { font-family:"New York",Georgia,serif; font-size:2.4rem; margin:0 0 8px; }
  p.tag { color:var(--muted); font-size:1.15rem; margin:0 0 28px; }
  .links a { display:inline-block; margin:6px 8px; color:var(--accent); text-decoration:none; font-weight:600; padding:10px 18px; border:1px solid var(--border); border-radius:999px; background:var(--card); }
  .links a:hover { opacity:0.85; }
  footer { color:var(--muted); font-size:0.85rem; margin-top:40px; }
</style>
</head>
<body>
<main>
  <div class="mark"><div class="drop"></div></div>
  <h1>Sillora</h1>
  <p class="tag">The wardrobe for people who love fragrance.</p>
  <div class="links">
    <a href="./privacy-policy.html">Privacy Policy</a>
    <a href="./terms.html">Terms of Use</a>
    <a href="./support.html">Support</a>
  </div>
  <footer>© 2026 TheKnack · No account · On-device · Your data is yours</footer>
</main>
</body>
</html>
